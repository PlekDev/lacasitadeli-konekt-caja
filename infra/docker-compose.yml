version: '3.8'

services:
  # 1. Base de Datos Principal
  db:
    image: postgres:15-alpine
    container_name: lacasita-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache y Colas
  redis:
    image: redis:7-alpine
    container_name: lacasita-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Automatizaciones (n8n)
  n8n:
    image: n8nio/n8n:latest
    container_name: lacasita-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password123
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - db

  # 4. API Backend (Node.js)
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: lacasita-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy

  # 5. Panel Web (Next.js)
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: lacasita-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  n8n_data: